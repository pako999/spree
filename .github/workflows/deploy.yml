name: Deploy to Production

on:
  workflow_dispatch:  # allow manual runs from the Actions tab
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: 51.195.110.240
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 10m
          script: |
            set -e
            echo ">>> Deploy started at $(date)"

            # ---- Pull latest code ----
            cd /home/ubuntu/kite_shop
            git fetch origin
            git reset --hard origin/main

            # ---- Install deps ----
            cd sandbox
            export RAILS_ENV=production
            ~/.rbenv/bin/rbenv exec bundle config set --local deployment true
            ~/.rbenv/bin/rbenv exec bundle config set --local without 'development test'
            ~/.rbenv/bin/rbenv exec bundle install

            # ---- Migrate & assets ----
            ~/.rbenv/bin/rbenv exec bundle exec rails db:migrate
            ~/.rbenv/bin/rbenv exec bundle exec rails assets:precompile

            # ---- Graceful Puma restart ----
            rm -rf tmp/cache/bootsnap 2>/dev/null || true
            pkill -f "puma.*3000" 2>/dev/null || true
            sleep 3

            RAILS_ENV=production SOLID_QUEUE_IN_PUMA=1 WEB_CONCURRENCY=4 \
              setsid ~/.rbenv/bin/rbenv exec bundle exec puma \
              -C config/puma.rb -b tcp://127.0.0.1:3000 \
              </dev/null > /tmp/puma.log 2>&1 &

            sleep 10
            if ss -tlnp | grep -q ':3000'; then
              echo ">>> ✅ Puma running on port 3000"
            else
              echo ">>> ❌ Puma failed!"
              tail -20 /tmp/puma.log
              exit 1
            fi

            # ---- Ensure nginx Docker proxy is running ----
            if ! docker ps --format '{{.Names}}' | grep -q nginx-proxy; then
              echo ">>> Starting nginx proxy..."
              docker start nginx-proxy 2>/dev/null || true
            fi

            echo ">>> ✅ Deploy completed at $(date)"
