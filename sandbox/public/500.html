<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Server Error | Surf-Store.com</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f8fafc;color:#1a2332}
    .container{text-align:center;padding:40px 24px;max-width:540px}
    .icon{font-size:80px;margin-bottom:16px;animation:spin 2s ease-in-out infinite}
    @keyframes spin{0%,100%{transform:rotate(0deg)}25%{transform:rotate(15deg)}75%{transform:rotate(-15deg)}}
    .code{font-size:8rem;font-weight:900;color:#e2e8f0;line-height:1;letter-spacing:-4px}
    h1{font-size:clamp(2rem,5vw,3rem);font-weight:800;margin-bottom:8px}
    .tagline{font-size:1.1rem;color:#64748b;margin-bottom:32px;line-height:1.5}
    .redirect-msg{font-size:0.9rem;color:#94a3b8;margin-bottom:24px}
    .redirect-msg span{background:#1a2332;color:#fff;font-weight:700;padding:2px 10px;border-radius:20px}
    .btn{display:inline-flex;padding:14px 28px;border-radius:8px;font-size:0.95rem;font-weight:600;text-decoration:none;background:#1a2332;color:#fff;transition:all .2s}
    .btn:hover{background:#2a3a4e;transform:translateY(-1px)}
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">&#127746;</div>
    <div class="code">500</div>
    <h1>Storm on the Server!</h1>
    <p class="tagline">Our crew is battling the waves. We'll be back up before the next set rolls in.</p>
    <p class="redirect-msg">Retrying in <span id="countdown">8</span> seconds...</p>
    <a href="/" class="btn">Back to Shore</a>
  </div>
  <script>!function(){var c=8,e=document.getElementById("countdown");setInterval(function(){c--;e&&(e.textContent=c);c<=0&&(window.location.href="/")},1e3)}()</script>
</body>
</html>
