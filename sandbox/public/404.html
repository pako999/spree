<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Page Not Found | Surf-Store.com</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f8fafc;color:#1a2332;overflow:hidden}
    .container{text-align:center;padding:40px 24px;max-width:540px}
    .wave{font-size:80px;margin-bottom:16px;animation:float 3s ease-in-out infinite}
    @keyframes float{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-15px) rotate(5deg)}}
    h1{font-size:clamp(2rem,5vw,3.5rem);font-weight:800;color:#1a2332;margin-bottom:8px;letter-spacing:-1px}
    .code{font-size:8rem;font-weight:900;color:#e2e8f0;line-height:1;margin-bottom:4px;letter-spacing:-4px}
    .tagline{font-size:1.15rem;color:#64748b;margin-bottom:32px;line-height:1.5}
    .tagline strong{color:#1a2332}
    .redirect-msg{font-size:0.9rem;color:#94a3b8;margin-bottom:24px}
    .redirect-msg span{display:inline-block;background:#1a2332;color:#fff;font-weight:700;padding:2px 10px;border-radius:20px;min-width:28px;text-align:center}
    .btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
    .btn{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;border-radius:8px;font-size:0.95rem;font-weight:600;text-decoration:none;transition:all .2s}
    .btn-primary{background:#1a2332;color:#fff}
    .btn-primary:hover{background:#2a3a4e;transform:translateY(-1px)}
    .btn-secondary{background:#fff;color:#1a2332;border:2px solid #e2e8f0}
    .btn-secondary:hover{border-color:#1a2332;transform:translateY(-1px)}
    .ocean{position:fixed;bottom:0;left:0;right:0;height:60px;background:linear-gradient(0deg,#dbeafe 0%,transparent 100%);pointer-events:none}
    .bubbles{position:fixed;bottom:0;left:0;right:0;height:200px;pointer-events:none;overflow:hidden}
    .bubble{position:absolute;bottom:-20px;background:rgba(59,130,246,0.08);border-radius:50%;animation:rise linear infinite}
    @keyframes rise{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-300px) scale(0.5);opacity:0}}
  </style>
</head>
<body>

  <div class="bubbles">
    <div class="bubble" style="width:40px;height:40px;left:10%;animation-duration:4s;animation-delay:0s"></div>
    <div class="bubble" style="width:20px;height:20px;left:30%;animation-duration:5s;animation-delay:1s"></div>
    <div class="bubble" style="width:35px;height:35px;left:50%;animation-duration:4.5s;animation-delay:0.5s"></div>
    <div class="bubble" style="width:25px;height:25px;left:70%;animation-duration:5.5s;animation-delay:2s"></div>
    <div class="bubble" style="width:30px;height:30px;left:85%;animation-duration:4s;animation-delay:1.5s"></div>
  </div>

  <div class="container">
    <div class="wave">&#127754;</div>
    <div class="code">404</div>
    <h1>Wipeout!</h1>
    <p class="tagline">
      This page got <strong>swept away by the tide</strong>.<br>
      Don't worry, the wind is still blowing &mdash; let's get you back on the water!
    </p>
    <p class="redirect-msg">Catching the next wave in <span id="countdown">5</span> seconds...</p>
    <div class="btns">
      <a href="/" class="btn btn-primary">&#127968; Back to Shore</a>
      <a href="/t/categories/kitesurfing" class="btn btn-secondary">&#129667; Browse Kites</a>
    </div>
  </div>

  <div class="ocean"></div>

  <script>
    (function(){
      var count = 5;
      var el = document.getElementById('countdown');
      var timer = setInterval(function(){
        count--;
        if(el) el.textContent = count;
        if(count <= 0){
          clearInterval(timer);
          window.location.href = '/';
        }
      }, 1000);
    })();
  </script>
</body>
</html>
