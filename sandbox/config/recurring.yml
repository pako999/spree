# examples:
#   periodic_cleanup:
#     class: CleanSoftDeletedRecordsJob
#     queue: background
#     args: [ 1000, { batch_size: 500 } ]
#     schedule: every hour
#   periodic_cleanup_with_command:
#     command: "SoftDeletedRecord.due.delete_all"
#     priority: 2
#     schedule: at 5am every day

production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12

  clear_solid_queue_failed_jobs:
    # Discard failed executions older than 7 days to prevent table bloat.
    # Jobs with discard_on handlers (FileNotFoundError, DeserializationError)
    # will no longer land here, but existing backlog still needs clearing.
    command: "SolidQueue::FailedExecution.where(created_at: ...7.days.ago).delete_all"
    schedule: every day at 3am

  sync_bam_stock:
    class: SyncBamStockJob
    queue: default
    schedule: every hour at minute 0

  sync_pryde_stock:
    class: SyncPrydeStockJob
    queue: default
    schedule: every 6 hours at minute 30

  sync_gaastra_stock:
    class: SyncGaastraStockJob
    queue: default
    schedule: every 3 hours at minute 45

  # ── Weekly SEO automation ──────────────────────────────────────────────────
  generate_seo_meta:
    class: GenerateSeoMetaJob
    queue: background
    schedule: 0 2 * * 1   # every Monday at 02:00 UTC

  generate_alt_tags:
    class: GenerateAltTagsJob
    queue: background
    schedule: 0 3 * * 1   # every Monday at 03:00 UTC

  index_now_ping:
    class: IndexNowPingJob
    queue: background
    schedule: 0 4 * * 1   # every Monday at 04:00 UTC

  warm_cache:
    class: WarmCacheJob
    queue: background
    schedule: 0 5 * * *   # every day at 05:00 UTC — refresh category caches
